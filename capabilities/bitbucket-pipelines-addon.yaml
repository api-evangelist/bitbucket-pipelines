          type: object
          value: $.
      - name: get
        method: GET
        description: List linker values for a linker
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Create a linker value
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: put
        method: PUT
        description: Update a linker value
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
