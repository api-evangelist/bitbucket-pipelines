aid: bitbucket-pipelines
url: https://raw.githubusercontent.com/api-evangelist/bitbucket-pipelines/refs/heads/main/apis.yml
name: Bitbucket Pipelines
kind: company
description: >-
  Bitbucket Pipelines is Atlassian's built-in CI/CD service for Bitbucket Cloud, with cloud-hosted and self-hosted
  runners and YAML-defined pipelines. Pipelines is consumed via the Bitbucket Cloud REST API v2.0 under the /pipelines/
  resource family. Atlassian publishes a Swagger 2.0 specification for the full Bitbucket Cloud API.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - DevOps
  - CI/CD
  - Pipelines
  - Atlassian
  - Bitbucket
  - Hosted
  - Self-Hosted Runners
created: '2026-05-08'
modified: '2026-05-19'
specificationVersion: '0.19'
apis:
  - aid: bitbucket-pipelines:rest
    name: Bitbucket Cloud REST API v2.0 (Pipelines)
    description: >-
      The Pipelines slice of the Bitbucket Cloud REST API v2.0. Endpoint families include
      /repositories/{workspace}/{repo_slug}/pipelines/, /pipelines/{pipeline_uuid}/steps/, /pipelines_config,
      deployments, environments, schedules, ssh keys, variables, known hosts, runners and caches. OAuth 2.0, app
      passwords or workspace access tokens.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.atlassian.com/cloud/bitbucket/rest/api-group-pipelines/
    baseURL: https://api.bitbucket.org/2.0
    tags:
      - REST
      - v2.0
      - Pipelines
      - Deployments
      - Runners
    properties:
      - type: Documentation
        url: https://developer.atlassian.com/cloud/bitbucket/rest/api-group-pipelines/
      - type: APIReference
        url: https://developer.atlassian.com/cloud/bitbucket/rest/intro/
