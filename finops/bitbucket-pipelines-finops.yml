specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Bitbucket Pipelines
providerId: bitbucket-pipelines
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- DevOps
- CI/CD
- Pipelines
- Atlassian
- Bitbucket
- FinOps
- Cost Management
- FOCUS
description: >-
  FOCUS-aligned FinOps profile for Bitbucket Pipelines. Costs come from the
  Bitbucket Cloud per-user subscription (Standard/Premium), Pipelines
  build-minute consumption (with per-tier free allotment plus $10/1,000
  minute add-on packs), Premium-only advanced security charges, plus the
  customer's own infrastructure cost for self-hosted runners (free at the
  Pipelines layer).
notes: >-
  Atlassian invoices monthly in USD per workspace; the Bitbucket admin
  Pipelines usage page shows minute consumption per repository, suitable for
  chargeback. Self-hosted runner labels can also be used as cost-allocation
  tags.
sources:
- https://www.atlassian.com/software/bitbucket/pricing
- https://support.atlassian.com/bitbucket-cloud/docs/build-minutes/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Atlassian
serviceCategory: DevOps / CI/CD
billingModel:
  pricingCategory: Subscription + Usage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Bitbucket Pipelines
  ServiceCategory: DevOps
  ProviderName: Atlassian
  PublisherName: Atlassian
  InvoiceIssuerName: Atlassian
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingUnit: user / minute
meters:
- name: bitbucket_users
  description: Active Bitbucket Cloud users in the billing month.
  unit: user-month
  aggregation: max
  dimensions:
  - workspace
  - tier
- name: pipelines_build_minutes
  description: Pipelines hosted-runner build minutes consumed.
  unit: minute
  aggregation: sum
  dimensions:
  - workspace
  - repository
- name: additional_minute_packs
  description: 1,000-minute packs purchased above the included allotment.
  unit: pack-month
  aggregation: sum
  dimensions:
  - workspace
- name: self_hosted_runner_vm_hours
  description: Underlying cloud compute hours for self-hosted Pipelines runners.
  unit: vm-hour
  aggregation: sum
  dimensions:
  - cloud_account
  - runner_label
principles:
- name: Visibility
  description: Use the Bitbucket admin Pipelines minutes page; reconcile against monthly Atlassian invoice.
- name: Allocation
  description: Allocate by repository / workspace; add cost-center tags via runner labels for self-hosted.
- name: Optimization
  description: Cache aggressively; use parallel steps wisely; switch heavy workloads to free self-hosted runners; right-size 1,000-minute packs vs upgrading tier.
- name: Accountability
  description: Assign workspace admin owners; alert on minute-consumption trajectory toward plan ceiling.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
