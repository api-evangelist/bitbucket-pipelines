description: >-
  Bitbucket Cloud bundles Pipelines into its three subscription tiers — Free,
  Standard and Premium — each with an included monthly Pipelines build-minute
  allotment. Additional minutes are sold uniformly across tiers as 1,000-min
  packs at $10. Self-hosted runners are free; only the build-minute meter
  matters for cloud-hosted runners.
notes: >-
  Prices reflect public Atlassian pricing as of 2026-05-08. The Free plan is
  capped at 5 users.
sources:
- https://www.atlassian.com/software/bitbucket/pricing
- https://support.atlassian.com/bitbucket-cloud/docs/build-minutes/
plans:
- id: bb-cloud-free
  name: Bitbucket Cloud Free (Pipelines)
  type: free
  description: Free plan — up to 5 users, 50 Pipelines build minutes/month.
